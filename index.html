<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Hand Love Particle Stable</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      background: #030313;
      overflow: hidden;
      font-family: Arial, sans-serif;
      color: white;
      touch-action: manipulation;
    }
    video {
      position: fixed;
      opacity: 0;
      pointer-events: none;
      width: 1px;
      height: 1px;
    }
    canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: #030313;
      z-index: 1;
    }
    .info {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
      backdrop-filter: blur(10px);
      font-size: 14px;
      text-align: center;
      max-width: 92vw;
    }
    .start {
      position: fixed;
      inset: 0;
      z-index: 999;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at center, #25114a, #060616 75%);
    }
    .panel {
      text-align: center;
      padding: 24px;
    }
    .panel h1 {
      font-size: 26px;
      margin-bottom: 12px;
    }
    .panel p {
      opacity: 0.82;
      margin-bottom: 18px;
      line-height: 1.4;
    }
    button {
      border: 0;
      border-radius: 999px;
      padding: 17px 26px;
      font-size: 17px;
      font-weight: bold;
      color: white;
      background: linear-gradient(135deg, #ff4fd8, #7c4dff, #00d4ff);
      box-shadow: 0 0 30px rgba(255, 79, 216, 0.55);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <video id="video" autoplay playsinline muted></video>

  <div class="info" id="info">Klik mulai, lalu izinkan kamera</div>

  <div class="start" id="startScreen">
    <div class="panel">
      <h1>rating bolo</h1>
      <p>haihai hallo.<br></p>
      <button id="startBtn" type="button">Mulai Efek ✨</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

  <script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d", { alpha: false });
    const info = document.getElementById("info");
    const startScreen = document.getElementById("startScreen");
    const startBtn = document.getElementById("startBtn");

    let w = innerWidth;
    let h = innerHeight;
    let ratio = 1;

    let hands = null;
    let appStarted = false;
    let detecting = false;
    let detectTimer = null;
    let animationRunning = false;

    let handX = w / 2;
    let handY = h / 2;
    let smoothX = w / 2;
    let smoothY = h / 2;
    let openPalm = false;
    let wasOpenPalm = false;
    let time = 0;

    const stars = [];
    const particles = [];
    const sparks = [];

    function rnd(min, max) {
      return Math.random() * (max - min) + min;
    }

    function resize() {
      w = innerWidth;
      h = innerHeight;
      ratio = Math.min(devicePixelRatio || 1, 1.15);
      canvas.width = Math.floor(w * ratio);
      canvas.height = Math.floor(h * ratio);
      canvas.style.width = w + "px";
      canvas.style.height = h + "px";
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);

      stars.length = 0;
      const starCount = Math.min(55, Math.floor((w * h) / 19000));
      for (let i = 0; i < starCount; i++) {
        stars.push({
          x: rnd(0, w),
          y: rnd(0, h),
          r: rnd(0.7, 1.7),
          speed: rnd(0.15, 0.45),
          hue: rnd(190, 330),
          phase: rnd(0, Math.PI * 2)
        });
      }
    }
    addEventListener("resize", resize);
    resize();

    function heartPoint(t, cx, cy, scale) {
      const x = 16 * Math.pow(Math.sin(t), 3);
      const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
      return { x: cx + x * scale, y: cy + y * scale };
    }

    function makeLove() {
      particles.length = 0;
      const cx = smoothX;
      const cy = smoothY - 90;
      const scale = Math.min(w, h) * 0.02;
      const total = 220;

      for (let i = 0; i < total; i++) {
        const t = Math.random() * Math.PI * 2;
        const target = heartPoint(t, cx, cy, scale);
        particles.push({
          x: smoothX + rnd(-70, 70),
          y: smoothY + rnd(-70, 70),
          ox: target.x - cx,
          oy: target.y - cy,
          tx: target.x,
          ty: target.y,
          size: rnd(2, 4.2),
          speed: rnd(0.16, 0.28),
          hue: rnd(0, 360),
          orbit: rnd(0, Math.PI * 2),
          orbitSize: rnd(1.5, 7)
        });
      }
      burst(cx, cy, 22);
    }

    function burst(x, y, total) {
      for (let i = 0; i < total; i++) {
        if (sparks.length > 60) sparks.shift();
        const a = Math.random() * Math.PI * 2;
        const s = rnd(1.5, 5.5);
        sparks.push({
          x, y,
          vx: Math.cos(a) * s,
          vy: Math.sin(a) * s,
          life: 1,
          decay: rnd(0.04, 0.065),
          size: rnd(2, 4.5),
          hue: rnd(0, 360)
        });
      }
    }

    function drawBackground() {
      const g = ctx.createRadialGradient(smoothX, smoothY, 20, smoothX, smoothY, Math.max(w, h));
      g.addColorStop(0, openPalm ? "rgb(80, 18, 105)" : "rgb(20, 12, 50)");
      g.addColorStop(0.55, "rgb(8, 8, 34)");
      g.addColorStop(1, "rgb(3, 3, 19)");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, w, h);

      for (const s of stars) {
        s.y += s.speed;
        s.phase += 0.05;
        if (s.y > h + 8) {
          s.y = -8;
          s.x = rnd(0, w);
        }
        const a = 0.35 + Math.sin(s.phase) * 0.25;
        ctx.fillStyle = `hsla(${s.hue}, 100%, 75%, ${a})`;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawAura() {
      if (!openPalm) return;
      for (let i = 0; i < 2; i++) {
        const r = 58 + i * 35 + Math.sin(time * 0.12 + i) * 9;
        ctx.beginPath();
        ctx.strokeStyle = `hsla(${305 + i * 28}, 100%, 70%, ${0.28 - i * 0.1})`;
        ctx.lineWidth = 3;
        ctx.arc(smoothX, smoothY, r, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    function drawParticles() {
      smoothX += (handX - smoothX) * 0.36;
      smoothY += (handY - smoothY) * 0.36;

      if (openPalm && !wasOpenPalm) makeLove();
      wasOpenPalm = openPalm;

      if (openPalm && particles.length && time % 28 === 0) {
        burst(smoothX + rnd(-60, 60), smoothY - 90 + rnd(-60, 60), 5);
      }

      for (const p of particles) {
        if (openPalm) {
          p.orbit += 0.13;
          p.tx = smoothX + p.ox + Math.cos(p.orbit) * p.orbitSize;
          p.ty = smoothY - 90 + p.oy + Math.sin(p.orbit) * p.orbitSize;
        } else {
          p.ty -= 0.6;
          p.tx += Math.sin(time * 0.03 + p.orbit) * 0.5;
        }

        p.x += (p.tx - p.x) * p.speed;
        p.y += (p.ty - p.y) * p.speed;
        p.hue += 2.2;

        ctx.fillStyle = `hsl(${p.hue}, 100%, 67%)`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawSparks() {
      for (let i = sparks.length - 1; i >= 0; i--) {
        const s = sparks[i];
        s.x += s.vx;
        s.y += s.vy;
        s.vx *= 0.93;
        s.vy *= 0.93;
        s.life -= s.decay;

        ctx.fillStyle = `hsla(${s.hue}, 100%, 70%, ${Math.max(s.life, 0)})`;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size * Math.max(s.life, 0), 0, Math.PI * 2);
        ctx.fill();

        if (s.life <= 0) sparks.splice(i, 1);
      }
    }

    function drawHearts() {
      if (!openPalm) return;
      ctx.globalAlpha = 0.8;
      for (let i = 0; i < 3; i++) {
        const a = time * 0.035 + i * 2.1;
        const x = smoothX + Math.cos(a) * (95 + i * 14);
        const y = smoothY - 90 + Math.sin(a * 1.3) * (60 + i * 9);
        ctx.font = `${22 + i * 3}px Arial`;
        ctx.fillText("💖", x, y);
      }
      ctx.globalAlpha = 1;
    }

    function animate() {
      if (!animationRunning) return;
      try {
        time++;
        drawBackground();
        drawAura();
        drawParticles();
        drawSparks();
        drawHearts();
      } catch (err) {
        console.log("Animasi error:", err);
        info.textContent = "Animasi error, refresh halaman lalu coba lagi";
      }
      requestAnimationFrame(animate);
    }

    function isOpenPalmGesture(lm) {
      const tips = [8, 12, 16, 20];
      const pips = [6, 10, 14, 18];
      let count = 0;
      for (let i = 0; i < tips.length; i++) {
        if (lm[tips[i]].y < lm[pips[i]].y) count++;
      }
      return count >= 4;
    }

    function setupHands() {
      if (typeof Hands === "undefined") {
        info.textContent = "MediaPipe gagal dimuat. Cek internet lalu refresh.";
        return false;
      }

      hands = new Hands({ locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
      hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 0,
        minDetectionConfidence: 0.6,
        minTrackingConfidence: 0.6
      });

      hands.onResults(results => {
        if (!results.multiHandLandmarks || !results.multiHandLandmarks[0]) {
          openPalm = false;
          info.textContent = "Tangan belum terdeteksi";
          return;
        }

        const lm = results.multiHandLandmarks[0];
        handX = w - lm[0].x * w;
        handY = lm[0].y * h;
        openPalm = isOpenPalmGesture(lm);
        info.textContent = openPalm ? "Telapak terbuka 🖐️ Love mengikuti tangan 💖" : "Buka telapak tangan untuk membuat love";
      });

      return true;
    }

    async function detectOnce() {
      if (!appStarted || detecting || !hands || video.readyState < 2) return;
      detecting = true;
      try {
        await hands.send({ image: video });
      } catch (err) {
        console.log("Deteksi error:", err);
      }
      detecting = false;
    }

    async function startApp() {
      startBtn.disabled = true;
      startBtn.textContent = "Membuka kamera...";
      info.textContent = "Meminta izin kamera...";

      animationRunning = true;
      if (!appStarted) requestAnimationFrame(animate);

      if (!setupHands()) {
        startBtn.disabled = false;
        startBtn.textContent = "Coba Lagi";
        return;
      }

      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: "user",
            width: { ideal: 256, max: 320 },
            height: { ideal: 192, max: 240 },
            frameRate: { ideal: 10, max: 12 }
          },
          audio: false
        });

        video.srcObject = stream;
        await video.play();

        appStarted = true;
        startScreen.style.display = "none";
        info.textContent = "Buka telapak tangan untuk membuat love";

        if (detectTimer) clearInterval(detectTimer);
        detectTimer = setInterval(detectOnce, 130);
      } catch (err) {
        console.log("Kamera error:", err);
        info.textContent = "Kamera gagal. Pastikan izin kamera aktif dan buka lewat HTTPS/GitHub Pages.";
        startBtn.disabled = false;
        startBtn.textContent = "Coba Lagi";
      }
    }

    startBtn.addEventListener("click", startApp);
    startBtn.addEventListener("touchend", e => {
      e.preventDefault();
      if (!startBtn.disabled) startApp();
    });
  </script>
</body>
</html>
